# Local development / testing only. HF Spaces runs api + ui inside ONE
# container via entrypoint.sh; this file runs them as two containers so
# you can iterate on either service independently (e.g. `docker compose
# up api` and hit it with curl/Postman without the UI running at all).
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/code/app
      - hf-cache:/code/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: python ui/gradio_app.py
    ports:
      - "7860:7860"
    environment:
      - API_BASE=http://api:8000/api/v1
      - GRADIO_PORT=7860
    volumes:
      - ./ui:/code/ui
    depends_on:
      api:
        condition: service_healthy

volumes:
  hf-cache:
